<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MOMENTO∞ — CINEMA</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

/* ── TELA CINEMA — FUNDO TOTAL ── */
#cinema {
  position: fixed; inset: 0;
  background: #000;
  display: flex; align-items: center; justify-content: center;
}

/* vídeos — dois elementos alternados para cross-fade suave */
.video-layer {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  opacity: 0;
  transition: opacity 0.8s ease;
  background: #000;
}
.video-layer.ativo { opacity: 1; }

/* ── TELA AGUARDANDO ── */
#aguardando {
  position: fixed; inset: 0; z-index: 20;
  background: #000;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 28px;
  transition: opacity 1s ease;
}
#aguardando.oculto { opacity: 0; pointer-events: none; }

.ag-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 64px; letter-spacing: 12px;
  color: #fff;
  text-shadow: 0 0 60px rgba(255,255,255,0.15);
}
.ag-logo span { color: rgba(255,255,255,0.3); }
.ag-sub {
  font-family: 'Montserrat', sans-serif;
  font-size: 11px; letter-spacing: 6px;
  color: rgba(255,255,255,0.3);
  text-transform: uppercase;
}
.ag-pulse {
  width: 6px; height: 6px; border-radius: 50%;
  background: #fff; opacity: 0.4;
  animation: pulse 2s ease infinite;
}
@keyframes pulse { 0%,100%{transform:scale(.7);opacity:.2;} 50%{transform:scale(1.3);opacity:.8;} }

/* ── QR LATERAL (discreto, canto inferior direito) ── */
#qr-canto {
  position: fixed; bottom: 28px; right: 28px; z-index: 30;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  opacity: 0.85;
  transition: opacity 0.3s;
}
#qr-canto:hover { opacity: 1; }
#qr-wrap {
  background: #fff; padding: 8px; border-radius: 4px;
  box-shadow: 0 0 30px rgba(0,0,0,0.8);
}
.qr-hint {
  font-family: 'Montserrat', sans-serif;
  font-size: 9px; letter-spacing: 3px;
  color: rgba(255,255,255,0.5);
  text-transform: uppercase; text-align: center;
}

/* ── BADGE NOVO VÍDEO ── */
#badge-novo {
  position: fixed; top: 28px; left: 50%;
  transform: translateX(-50%) translateY(-80px);
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 40px;
  padding: 10px 28px;
  font-family: 'Montserrat', sans-serif;
  font-size: 11px; letter-spacing: 4px;
  color: rgba(255,255,255,0.8);
  text-transform: uppercase;
  z-index: 30;
  transition: transform 0.5s cubic-bezier(0.22,1,0.36,1);
  pointer-events: none;
}
#badge-novo.show { transform: translateX(-50%) translateY(0); }

/* ── SESSÃO ID (canto inferior esquerdo) ── */
#sessao-label {
  position: fixed; bottom: 28px; left: 28px; z-index: 30;
  font-family: 'Montserrat', monospace;
  font-size: 9px; letter-spacing: 3px;
  color: rgba(255,255,255,0.2);
  text-transform: uppercase;
}

/* ── WS STATUS (topo esquerdo, discreto) ── */
#ws-dot {
  position: fixed; top: 24px; left: 28px; z-index: 30;
  display: flex; align-items: center; gap: 6px;
  font-family: 'Montserrat', sans-serif;
  font-size: 8px; letter-spacing: 2px;
  color: rgba(255,255,255,0.25);
  text-transform: uppercase;
}
.dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: rgba(255,255,255,0.2);
  transition: background 0.3s;
}
.dot.verde  { background: #4caf82; box-shadow: 0 0 6px #4caf82; }
.dot.amarelo{ background: #e8c040; }
.dot.vermelho{ background: #e05252; }

/* flash branco ao trocar vídeo */
#flash {
  position: fixed; inset: 0; z-index: 25;
  background: #fff; opacity: 0; pointer-events: none;
  transition: opacity 0.08s;
}
#flash.on { opacity: 0.12; }
</style>
</head>
<body>

<div id="flash"></div>

<!-- tela aguardando -->
<div id="aguardando">
  <div class="ag-logo">Momento<span>∞</span></div>
  <div class="ag-sub">Aguardando o primeiro vídeo...</div>
  <div class="ag-pulse"></div>
</div>

<!-- cinema: dois layers para cross-fade -->
<div id="cinema">
  <video class="video-layer" id="videoA" playsinline autoplay muted loop></video>
  <video class="video-layer" id="videoB" playsinline autoplay muted loop></video>
</div>

<!-- QR discreto no canto -->
<div id="qr-canto">
  <div id="qr-wrap"></div>
  <div class="qr-hint">Envie seu vídeo</div>
</div>

<!-- badge novo vídeo -->
<div id="badge-novo">▶ Novo vídeo</div>

<!-- infos discretas -->
<div id="sessao-label">Sessão: <span id="sessaoLabel">—</span></div>
<div id="ws-dot"><div class="dot" id="wsDot"></div><span id="wsTxt">conectando</span></div>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const params        = new URLSearchParams(location.search);
const sessaoIdParam = params.get('sessao') || null;
const WS_URL        = (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host;

// ── ESTADO ────────────────────────────────────────────────────────────────────
let sessaoId   = null;
let ws         = null;
let wsReconect = null;
let layerAtiva = 'A'; // alterna entre videoA e videoB para cross-fade

const videoA = document.getElementById('videoA');
const videoB = document.getElementById('videoB');

// ── INIT ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  if (sessaoIdParam) {
    await carregarSessao(sessaoIdParam);
  } else {
    await novaSessao();
  }
});

// ── SESSÃO ────────────────────────────────────────────────────────────────────
async function novaSessao() {
  const res  = await fetch('/api/sessao/nova', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ nomeEvento: 'Cinema Momento∞', tipo: 'video' }),
  });
  const data = await res.json();
  if (!data.success) return;
  aplicarSessao(data.sessaoId, data.urls.camera_video || data.urls.camera);
  conectarWS(data.sessaoId);
}

async function carregarSessao(id) {
  const res  = await fetch(`/api/sessao/${id}`);
  const data = await res.json();
  if (!data.success) { await novaSessao(); return; }
  const url = `${location.origin}/camera_video.html?sessao=${id}`;
  aplicarSessao(id, url);
  conectarWS(id);
}

function aplicarSessao(id, urlCamera) {
  sessaoId = id;
  document.getElementById('sessaoLabel').textContent = id;

  // QR no canto
  document.getElementById('qr-wrap').innerHTML = '';
  new QRCode(document.getElementById('qr-wrap'), {
    text: urlCamera, width: 100, height: 100,
    colorDark: '#000', colorLight: '#fff'
  });
}

// ── WEBSOCKET ─────────────────────────────────────────────────────────────────
function conectarWS(id) {
  if (wsReconect) clearTimeout(wsReconect);
  if (ws) ws.close();

  ws = new WebSocket(WS_URL);
  setWs('amarelo', 'conectando');

  ws.onopen = () => {
    ws.send(JSON.stringify({ tipo: 'tv_conectada', sessaoId: id, modo: 'video' }));
    setWs('verde', 'ao vivo');
  };

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.tipo === 'video') reproduzirVideo(msg.dataUrl);
    if (msg.tipo === 'sessao_encerrada') setWs('vermelho', 'encerrada');
  };

  ws.onclose = () => {
    setWs('vermelho', 'reconectando...');
    wsReconect = setTimeout(() => conectarWS(id), 3000);
  };
}

// ── REPRODUÇÃO — CROSS-FADE ───────────────────────────────────────────────────
function reproduzirVideo(dataUrl) {
  // esconde tela aguardando
  document.getElementById('aguardando').classList.add('oculto');

  // flash sutil
  const f = document.getElementById('flash');
  f.classList.add('on');
  setTimeout(() => f.classList.remove('on'), 120);

  // badge "novo vídeo"
  const badge = document.getElementById('badge-novo');
  badge.classList.add('show');
  setTimeout(() => badge.classList.remove('show'), 2500);

  // cross-fade entre os dois layers
  if (layerAtiva === 'A') {
    // carrega no B, faz fade
    videoB.src = dataUrl;
    videoB.load();
    videoB.oncanplay = () => {
      videoB.play();
      videoA.classList.remove('ativo');
      videoB.classList.add('ativo');
      layerAtiva = 'B';
      // limpa A depois do fade
      setTimeout(() => { videoA.src = ''; }, 1000);
    };
  } else {
    // carrega no A, faz fade
    videoA.src = dataUrl;
    videoA.load();
    videoA.oncanplay = () => {
      videoA.play();
      videoB.classList.remove('ativo');
      videoA.classList.add('ativo');
      layerAtiva = 'A';
      setTimeout(() => { videoB.src = ''; }, 1000);
    };
  }
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function setWs(cor, txt) {
  const dot = document.getElementById('wsDot');
  dot.className = `dot ${cor}`;
  document.getElementById('wsTxt').textContent = txt;
}
</script>
</body>
</html>
