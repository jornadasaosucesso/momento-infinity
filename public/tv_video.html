<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MOMENTO∞ — CINEMA</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

/* ── PLAYER ÚNICO ── */
#player {
  position: fixed; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  background: #000;
  display: none;
}
#player.visivel { display: block; }

/* ── TELA INÍCIO ── */
#tela-inicio {
  position: fixed; inset: 0; z-index: 50; background: #000;
  display: flex; align-items: center; justify-content: center; gap: 80px;
}
#tela-inicio.oculto { display: none; }

.logo { font-family:'Bebas Neue',sans-serif; font-size:80px; letter-spacing:16px; color:#fff; line-height:1; }
.logo em { color:rgba(255,255,255,.2); font-style:normal; }
.logo-sub { font-family:'Montserrat',sans-serif; font-size:10px; letter-spacing:8px; color:rgba(255,255,255,.25); text-transform:uppercase; margin-top:-14px; }

.inicio-esq { display:flex; flex-direction:column; align-items:flex-start; gap:28px; }
.inicio-dir { display:flex; flex-direction:column; align-items:center; gap:14px; }

#btn-ativar {
  background:#fff; color:#000; border:none; border-radius:50px; padding:16px 44px;
  font-family:'Montserrat',sans-serif; font-size:12px; font-weight:700; letter-spacing:5px;
  text-transform:uppercase; cursor:pointer; transition:transform .2s, background .2s;
}
#btn-ativar:hover  { background:#e8e8e8; transform:scale(1.03); }
#btn-ativar:active { transform:scale(.97); }
#btn-ativar.ok     { background:#4caf82; color:#fff; pointer-events:none; }
.ativar-hint { font-family:'Montserrat',sans-serif; font-size:8px; letter-spacing:3px; color:rgba(255,255,255,.18); text-transform:uppercase; }

#qr-box-inicio { background:#fff; padding:12px; border-radius:6px; box-shadow:0 0 60px rgba(255,255,255,.06); }
.qr-label { font-family:'Montserrat',sans-serif; font-size:9px; letter-spacing:4px; color:rgba(255,255,255,.3); text-transform:uppercase; text-align:center; }
.sessao-chip { font-family:'Montserrat',sans-serif; font-size:18px; font-weight:700; letter-spacing:8px; color:rgba(255,255,255,.15); text-align:center; }

/* ── AGUARDANDO ── */
#aguardando {
  position:fixed; inset:0; z-index:20; background:#000;
  display:none; flex-direction:column; align-items:center; justify-content:center; gap:24px;
}
#aguardando.visivel { display:flex; }
.ag-logo { font-family:'Bebas Neue',sans-serif; font-size:64px; letter-spacing:12px; color:#fff; }
.ag-logo em { color:rgba(255,255,255,.2); font-style:normal; }
.ag-sub  { font-family:'Montserrat',sans-serif; font-size:9px; letter-spacing:6px; color:rgba(255,255,255,.25); text-transform:uppercase; }
.pulse { width:7px; height:7px; border-radius:50%; background:#fff; opacity:.3; animation:pulse 2.2s ease infinite; }
@keyframes pulse { 0%,100%{transform:scale(.6);opacity:.15;} 50%{transform:scale(1.4);opacity:.6;} }

/* ── QR MINI ── */
#qr-mini { position:fixed; bottom:50px; right:20px; z-index:30; display:none; flex-direction:column; align-items:center; gap:6px; opacity:.7; }
#qr-mini.visivel { display:flex; }
#qr-box-mini { background:#fff; padding:6px; border-radius:4px; }
.qr-mini-txt { font-family:'Montserrat',sans-serif; font-size:7px; letter-spacing:2px; color:rgba(255,255,255,.3); text-transform:uppercase; }

/* ── BADGE ── */
#badge {
  position:fixed; top:24px; left:50%; transform:translateX(-50%) translateY(-70px); z-index:30;
  background:rgba(255,255,255,.08); backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,.15); border-radius:40px; padding:10px 30px;
  font-family:'Montserrat',sans-serif; font-size:10px; letter-spacing:5px;
  color:rgba(255,255,255,.85); text-transform:uppercase; pointer-events:none;
  transition:transform .55s cubic-bezier(.22,1,.36,1);
}
#badge.show { transform:translateX(-50%) translateY(0); }

/* ── STATUS BAR ── */
#status-bar {
  position:fixed; bottom:0; left:0; right:0; z-index:40;
  background:rgba(0,0,0,.85); backdrop-filter:blur(8px); padding:7px 20px;
  display:flex; align-items:center; justify-content:space-between;
  font-family:'Montserrat',sans-serif; font-size:9px; letter-spacing:2px; text-transform:uppercase;
}
.sb-ws  { display:flex; align-items:center; gap:6px; color:rgba(255,255,255,.3); }
.wsdot  { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,.2); transition:all .3s; }
.wsdot.verde    { background:#4caf82; box-shadow:0 0 8px #4caf82; }
.wsdot.amarelo  { background:#e8c040; }
.wsdot.vermelho { background:#e05252; }
.sb-msg { color:rgba(255,255,255,.45); font-size:9px; text-align:center; }
.sb-sid { color:rgba(255,255,255,.18); font-size:8px; }
</style>
</head>
<body>

<!-- TELA INÍCIO: QR + botão ativar -->
<div id="tela-inicio">
  <div class="inicio-esq">
    <div>
      <div class="logo">Momento<em>∞</em></div>
      <div class="logo-sub">Cinema ao vivo</div>
    </div>
    <button id="btn-ativar" onclick="ativar()">▶ Iniciar Cinema</button>
    <div class="ativar-hint">Clique uma vez para ativar reprodução</div>
  </div>
  <div class="inicio-dir">
    <div id="qr-box-inicio"></div>
    <div class="qr-label">Escaneie para enviar vídeo</div>
    <div class="sessao-chip" id="sessao-chip">carregando...</div>
  </div>
</div>

<!-- AGUARDANDO -->
<div id="aguardando">
  <div class="ag-logo">Momento<em>∞</em></div>
  <div class="ag-sub">Aguardando primeiro vídeo...</div>
  <div class="pulse"></div>
</div>

<!-- PLAYER ÚNICO -->
<video id="player" playsinline muted loop></video>

<!-- QR mini -->
<div id="qr-mini">
  <div id="qr-box-mini"></div>
  <div class="qr-mini-txt">Envie seu vídeo</div>
</div>

<div id="badge">▶ Novo vídeo</div>

<div id="status-bar">
  <div class="sb-ws"><div class="wsdot" id="wsdot"></div><span id="wstxt">iniciando</span></div>
  <div class="sb-msg" id="sb-msg">Carregando...</div>
  <div class="sb-sid">Sessão: <span id="sid">—</span></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
<script>
const params   = new URLSearchParams(location.search);
const sidParam = params.get('sessao') || null;
const WS_URL   = (location.protocol==='https:'?'wss://':'ws://')+location.host;

let sessaoId  = null;
let ws        = null;
let recon     = null;
let ativado   = false;
let videoFila = [];

const player = document.getElementById('player');

function msg(txt) { document.getElementById('sb-msg').textContent = txt; }

// ── CARREGA SESSÃO IMEDIATAMENTE ──────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  if (sidParam) await carregarSessao(sidParam);
  else          await novaSessao();
});

async function novaSessao() {
  msg('Criando sessão...');
  const r = await fetch('/api/sessao/nova', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ nomeEvento:'Cinema Momento∞' })
  });
  const d = await r.json();
  if (!d.success) { msg('ERRO ao criar sessão'); return; }
  aplicar(d.sessaoId, d.urls.camera_video);
  ligarWS(d.sessaoId);
}

async function carregarSessao(id) {
  const r = await fetch(`/api/sessao/${id}`);
  const d = await r.json();
  if (!d.success) { await novaSessao(); return; }
  aplicar(id, `${location.origin}/camera_video.html?sessao=${id}`);
  ligarWS(id);
}

function aplicar(id, camUrl) {
  sessaoId = id;
  document.getElementById('sid').textContent        = id;
  document.getElementById('sessao-chip').textContent = id;

  // QR grande
  document.getElementById('qr-box-inicio').innerHTML = '';
  new QRCode(document.getElementById('qr-box-inicio'), {
    text:camUrl, width:148, height:148, colorDark:'#000', colorLight:'#fff'
  });

  // QR mini
  document.getElementById('qr-box-mini').innerHTML = '';
  new QRCode(document.getElementById('qr-box-mini'), {
    text:camUrl, width:80, height:80, colorDark:'#000', colorLight:'#fff'
  });

  msg('QR pronto — escaneie e clique em Iniciar');
}

// ── ATIVAR ───────────────────────────────────────────────────────────────────
async function ativar() {
  ativado = true;
  const btn = document.getElementById('btn-ativar');
  btn.textContent = '✓ Ativado'; btn.classList.add('ok');

  // toca silêncio para liberar autoplay
  try {
    player.muted = true;
    player.src   = 'data:video/mp4;base64,AAAAHGZ0eXBpc29tAAACAGlzb21pc28yYXZjMQAAAAhmcmVlAAAAG21kYXQ=';
    await player.play().catch(()=>{});
    player.pause(); player.src = '';
  } catch(e) {}

  setTimeout(() => {
    document.getElementById('tela-inicio').classList.add('oculto');
    document.getElementById('aguardando').classList.add('visivel');
    document.getElementById('qr-mini').classList.add('visivel');
    msg('Ativado ✓ — aguardando vídeos');
  }, 600);

  if (videoFila.length > 0) {
    const url = videoFila.shift();
    setTimeout(() => tocarVideo(url), 800);
  }
}

// ── WEBSOCKET ─────────────────────────────────────────────────────────────────
function ligarWS(id) {
  if (recon) clearTimeout(recon);
  if (ws)    ws.close();
  ws = new WebSocket(WS_URL);
  setWS('amarelo','conectando');

  ws.onopen = () => {
    ws.send(JSON.stringify({ tipo:'tv_conectada', sessaoId:id }));
    setWS('verde','ao vivo');
    msg('Conectado ✓ — escaneie o QR para enviar vídeo');
  };

  ws.onmessage = (e) => {
    let m; try { m=JSON.parse(e.data); } catch { return; }
    if (m.tipo === 'video') {
      if (!m.videoUrl) { msg('ERRO: videoUrl ausente'); return; }
      msg('Vídeo chegou!');
      if (ativado) tocarVideo(m.videoUrl);
      else videoFila = [m.videoUrl];
    }
    if (m.tipo === 'sessao_encerrada') { setWS('vermelho','encerrada'); }
  };

  ws.onclose = () => {
    setWS('vermelho','reconectando');
    recon = setTimeout(() => ligarWS(id), 3000);
  };
}

// ── REPRODUÇÃO — PLAYER ÚNICO ─────────────────────────────────────────────────
function tocarVideo(videoUrl) {
  msg('Carregando vídeo...');

  // oculta tela aguardando
  document.getElementById('aguardando').style.display = 'none';

  // badge
  const b = document.getElementById('badge');
  b.classList.add('show'); setTimeout(()=>b.classList.remove('show'), 2800);

  // para o atual, troca src, toca
  player.pause();
  player.src   = videoUrl;
  player.muted = true;
  player.loop  = true;
  player.load();

  player.oncanplay = () => {
    player.classList.add('visivel');
    player.play()
      .then(()  => msg('Reproduzindo ▶'))
      .catch(err => msg('ERRO play: ' + err.message));
  };

  player.onerror = () => {
    const er = player.error;
    msg('ERRO vídeo ' + (er?er.code:'?') + ': ' + (er?er.message:''));
  };
}

function setWS(cor,txt) {
  document.getElementById('wsdot').className=`wsdot ${cor}`;
  document.getElementById('wstxt').textContent=txt;
}
</script>
</body>
</html>
