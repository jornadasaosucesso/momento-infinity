<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MOMENTO∞ — CINEMA</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; color: #fff; font-family: Arial, sans-serif; }

#player { position:fixed; inset:0; width:100%; height:100%; object-fit:cover; background:#000; display:none; }
#player.visivel { display:block; }

#tela-inicio {
  position:fixed; inset:0; z-index:50; background:#000;
  display:flex; align-items:center; justify-content:center; gap:60px; padding:40px;
}
#tela-inicio.oculto { display:none; }

.logo { font-size:64px; font-weight:900; letter-spacing:12px; color:#fff; line-height:1; }
.logo em { color:rgba(255,255,255,.2); font-style:normal; }
.logo-sub { font-size:11px; letter-spacing:6px; color:rgba(255,255,255,.3); text-transform:uppercase; margin-top:8px; }

.col-esq { display:flex; flex-direction:column; gap:28px; }
.col-dir  { display:flex; flex-direction:column; align-items:center; gap:14px; }

#btn-ativar {
  background:#fff; color:#000; border:none; border-radius:40px; padding:16px 40px;
  font-size:14px; font-weight:700; letter-spacing:4px; text-transform:uppercase; cursor:pointer;
}
#btn-ativar:hover { background:#e0e0e0; }
#btn-ativar.ok    { background:#4caf82; color:#fff; pointer-events:none; }
.hint { font-size:10px; letter-spacing:2px; color:rgba(255,255,255,.2); text-transform:uppercase; }

#qr-canvas { background:#fff; padding:12px; border-radius:6px; }
.qr-label  { font-size:10px; letter-spacing:3px; color:rgba(255,255,255,.3); text-transform:uppercase; }
#sid-big   { font-size:20px; font-weight:700; letter-spacing:8px; color:rgba(255,255,255,.2); }

#aguardando {
  position:fixed; inset:0; z-index:20; background:#000;
  display:none; flex-direction:column; align-items:center; justify-content:center; gap:20px;
}
#aguardando.visivel { display:flex; }
.ag-logo { font-size:56px; font-weight:900; letter-spacing:12px; }
.ag-logo em { color:rgba(255,255,255,.2); font-style:normal; }
.ag-sub  { font-size:10px; letter-spacing:6px; color:rgba(255,255,255,.25); text-transform:uppercase; }
.pulse   { width:8px; height:8px; border-radius:50%; background:#fff; opacity:.3; animation:pulse 2s ease infinite; }
@keyframes pulse { 0%,100%{transform:scale(.6);opacity:.15;} 50%{transform:scale(1.4);opacity:.6;} }

#qr-mini-wrap { position:fixed; bottom:50px; right:20px; z-index:30; display:none; flex-direction:column; align-items:center; gap:6px; opacity:.7; }
#qr-mini-wrap.visivel { display:flex; }
#qr-mini  { background:#fff; padding:6px; border-radius:4px; }
.qr-mini-txt { font-size:8px; letter-spacing:2px; color:rgba(255,255,255,.3); text-transform:uppercase; }

#status-bar {
  position:fixed; bottom:0; left:0; right:0; z-index:40;
  background:rgba(0,0,0,.9); padding:8px 20px;
  display:flex; align-items:center; justify-content:space-between;
  font-size:10px; letter-spacing:2px; text-transform:uppercase;
}
.sb-ws  { display:flex; align-items:center; gap:6px; color:rgba(255,255,255,.35); }
.wsdot  { width:7px; height:7px; border-radius:50%; background:#555; }
.wsdot.verde    { background:#4caf82; box-shadow:0 0 8px #4caf82; }
.wsdot.amarelo  { background:#e8c040; }
.wsdot.vermelho { background:#e05252; }
.sb-msg { color:rgba(255,255,255,.5); text-align:center; }
.sb-sid { color:rgba(255,255,255,.2); font-size:9px; }

#badge {
  position:fixed; top:20px; left:50%; transform:translateX(-50%) translateY(-60px); z-index:30;
  background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2); border-radius:30px; padding:10px 28px;
  font-size:11px; letter-spacing:4px; text-transform:uppercase; pointer-events:none;
  transition:transform .5s cubic-bezier(.22,1,.36,1);
}
#badge.show { transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="tela-inicio">
  <div class="col-esq">
    <div>
      <div class="logo">Momento<em>∞</em></div>
      <div class="logo-sub">Cinema ao vivo</div>
    </div>
    <button id="btn-ativar" onclick="ativar()">▶ Iniciar Cinema</button>
    <div class="hint">Clique uma vez para ativar reprodução</div>
  </div>
  <div class="col-dir">
    <canvas id="qr-canvas" width="160" height="160"></canvas>
    <div class="qr-label">Escaneie para enviar vídeo</div>
    <div id="sid-big">—</div>
  </div>
</div>

<div id="aguardando">
  <div class="ag-logo">Momento<em>∞</em></div>
  <div class="ag-sub">Aguardando primeiro vídeo...</div>
  <div class="pulse"></div>
</div>

<video id="player" playsinline muted loop></video>

<div id="qr-mini-wrap">
  <canvas id="qr-mini" width="90" height="90"></canvas>
  <div class="qr-mini-txt">Envie seu vídeo</div>
</div>

<div id="badge">▶ Novo vídeo</div>

<div id="status-bar">
  <div class="sb-ws"><div class="wsdot" id="wsdot"></div><span id="wstxt">iniciando</span></div>
  <div class="sb-msg" id="sb-msg">Carregando sessão...</div>
  <div class="sb-sid">Sessão: <span id="sid">—</span></div>
</div>

<script>
// ── QR CODE NATIVO (sem CDN) ──────────────────────────────────────────────────
// Implementação mínima de QR Code via canvas
function desenharQR(canvas, texto) {
  // usa a URL do celular diretamente como imagem QR via API externa sem JS bloqueado
  // fallback: mostra o link em texto se não conseguir
  const ctx = canvas.getContext('2d');
  const w = canvas.width; const h = canvas.height;
  ctx.fillStyle = '#fff';
  ctx.fillRect(0,0,w,h);

  // cria imagem QR via Google Charts API (sem JS externo)
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => { ctx.drawImage(img,0,0,w,h); };
  img.onerror = () => {
    // fallback: mostra URL em texto pequeno
    ctx.fillStyle = '#000';
    ctx.font = '8px Arial';
    ctx.fillText('Acesse:', 4, 14);
    const words = texto.split('/');
    words.forEach((w2,i) => ctx.fillText(w2, 4, 26 + i*10));
  };
  const size = w * 2;
  img.src = `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(texto)}`;
}

// ── ESTADO ────────────────────────────────────────────────────────────────────
const params   = new URLSearchParams(location.search);
const sidParam = params.get('sessao') || null;
const WS_URL   = (location.protocol==='https:'?'wss://':'ws://')+location.host;

let sessaoId  = null;
let ws        = null;
let recon     = null;
let ativado   = false;
let videoFila = [];

const player = document.getElementById('player');
function msg(txt) { document.getElementById('sb-msg').textContent = txt; }

// ── INIT ──────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  if (sidParam) await carregarSessao(sidParam);
  else          await novaSessao();
});

async function novaSessao() {
  msg('Criando sessão...');
  try {
    const r = await fetch('/api/sessao/nova', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ nomeEvento:'Cinema Momento∞' })
    });
    const d = await r.json();
    if (!d.success) throw new Error('falha');
    aplicar(d.sessaoId, d.urls.camera_video);
    ligarWS(d.sessaoId);
  } catch(e) { msg('ERRO ao criar sessão: ' + e.message); }
}

async function carregarSessao(id) {
  try {
    const r = await fetch(`/api/sessao/${id}`);
    const d = await r.json();
    if (!d.success) throw new Error();
    aplicar(id, `${location.origin}/camera_video.html?sessao=${id}`);
    ligarWS(id);
  } catch { await novaSessao(); }
}

function aplicar(id, camUrl) {
  sessaoId = id;
  document.getElementById('sid').textContent     = id;
  document.getElementById('sid-big').textContent = id;
  desenharQR(document.getElementById('qr-canvas'), camUrl);
  desenharQR(document.getElementById('qr-mini'),   camUrl);
  msg('QR pronto — escaneie e clique em Iniciar');
}

// ── ATIVAR ───────────────────────────────────────────────────────────────────
async function ativar() {
  ativado = true;
  const btn = document.getElementById('btn-ativar');
  btn.textContent = '✓ Ativado'; btn.classList.add('ok');

  try {
    player.muted = true;
    player.src   = 'data:video/mp4;base64,AAAAHGZ0eXBpc29tAAACAGlzb21pc28yYXZjMQAAAAhmcmVlAAAAG21kYXQ=';
    await player.play().catch(()=>{});
    player.pause(); player.removeAttribute('src'); player.load();
  } catch(e) {}

  setTimeout(() => {
    document.getElementById('tela-inicio').classList.add('oculto');
    document.getElementById('aguardando').classList.add('visivel');
    document.getElementById('qr-mini-wrap').classList.add('visivel');
    msg('Ativado ✓ — aguardando vídeos');
  }, 600);

  if (videoFila.length > 0) {
    const url = videoFila.shift();
    setTimeout(() => tocarVideo(url), 800);
  }
}

// ── WEBSOCKET ─────────────────────────────────────────────────────────────────
function ligarWS(id) {
  if (recon) clearTimeout(recon);
  try { if (ws) ws.close(); } catch(e) {}

  try {
    ws = new WebSocket(WS_URL);
  } catch(e) {
    msg('ERRO WS: ' + e.message);
    recon = setTimeout(() => ligarWS(id), 5000);
    return;
  }

  setWS('amarelo','conectando');
  msg('Conectando ao servidor...');

  ws.onopen = () => {
    ws.send(JSON.stringify({ tipo:'tv_conectada', sessaoId:id }));
    setWS('verde','ao vivo');
    msg('Conectado ✓ — escaneie o QR para enviar vídeo');
  };

  ws.onmessage = (e) => {
    let m;
    try { m = JSON.parse(e.data); } catch { return; }
    if (m.tipo === 'video') {
      if (!m.videoUrl) { msg('ERRO: videoUrl ausente na mensagem'); return; }
      msg('Vídeo chegou!');
      if (ativado) tocarVideo(m.videoUrl);
      else { videoFila = [m.videoUrl]; msg('Vídeo na fila — clique em Iniciar Cinema'); }
    }
    if (m.tipo === 'sessao_encerrada') setWS('vermelho','encerrada');
  };

  ws.onerror = (e) => {
    msg('ERRO WebSocket — verifique conexão');
    setWS('vermelho','erro');
  };

  ws.onclose = (e) => {
    setWS('vermelho','reconectando');
    msg('Desconectado (cód.' + e.code + ') — reconectando em 3s...');
    recon = setTimeout(() => ligarWS(id), 3000);
  };
}

// ── REPRODUÇÃO ────────────────────────────────────────────────────────────────
function tocarVideo(videoUrl) {
  msg('Carregando: ' + videoUrl.slice(-30));
  document.getElementById('aguardando').style.display = 'none';

  const b = document.getElementById('badge');
  b.classList.add('show'); setTimeout(()=>b.classList.remove('show'),2800);

  player.pause();
  player.removeAttribute('src');
  player.load();

  setTimeout(() => {
    player.muted  = true;
    player.loop   = true;
    player.src    = videoUrl;
    player.load();

    player.oncanplay = () => {
      player.classList.add('visivel');
      player.play()
        .then(()  => msg('Reproduzindo ▶ ' + videoUrl.slice(-20)))
        .catch(err => msg('ERRO play(): ' + err.name + ' — ' + err.message));
    };

    player.onerror = () => {
      const er = player.error;
      msg('ERRO carregar vídeo — código: ' + (er ? er.code : '?'));
    };
  }, 200);
}

function setWS(cor, txt) {
  document.getElementById('wsdot').className = `wsdot ${cor}`;
  document.getElementById('wstxt').textContent = txt;
}
</script>
</body>
</html>
