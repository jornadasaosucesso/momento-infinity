<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Momento∞ — Câmera ao Vivo</title>

<script>
(function(){
  var ua=navigator.userAgent||'';
  var wv=/FBAN|FBAV|Instagram|Line|Twitter|MicroMessenger|Snapchat/i.test(ua)
      ||(/iPhone|iPod|iPad/.test(ua)&&!/Safari/.test(ua))
      ||(/Android/.test(ua)&&/wv/.test(ua));
  if(wv&&/Android/i.test(ua)){
    location.href='intent://'+location.href.replace(/https?:\/\//,'')+'#Intent;scheme=https;package=com.android.chrome;end';
  }
})();
</script>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0a0a0a;--fg:#f0f0f0;--dim:rgba(240,240,240,.35);
  --borda:rgba(240,240,240,.1);--card:rgba(240,240,240,.05);
  --verde:#4caf82;--amarel:#e8c040;--verm:#e05252;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;background:var(--bg);color:var(--fg);}
body{font-family:'Montserrat',sans-serif;padding-bottom:max(40px,env(safe-area-inset-bottom));}

.wrap{max-width:420px;margin:0 auto;padding:0 20px 40px;position:relative;z-index:1;}

.hdr{padding:30px 0 20px;text-align:center;border-bottom:1px solid var(--borda);margin-bottom:22px;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:9px;}
.logo span{color:var(--dim);}
.sub{font-size:9px;letter-spacing:6px;color:var(--dim);text-transform:uppercase;margin-top:4px;}
.badge-sessao{display:inline-flex;align-items:center;gap:8px;background:var(--card);
  border:1px solid var(--borda);border-radius:3px;padding:5px 14px;margin-top:12px;}
.badge-label{font-size:7px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;}
.badge-val{font-size:13px;letter-spacing:5px;font-weight:700;}

.pill{display:flex;align-items:center;justify-content:center;gap:6px;width:fit-content;
  margin:0 auto 18px;padding:5px 16px;border-radius:20px;border:1px solid;
  font-size:8px;letter-spacing:3px;text-transform:uppercase;transition:all .3s;}
.pill.verde  {color:var(--verde); border-color:rgba(76,175,130,.3); background:rgba(76,175,130,.06);}
.pill.amarelo{color:var(--amarel);border-color:rgba(232,192,64,.3); background:rgba(232,192,64,.06);}
.pill.vermelho{color:var(--verm); border-color:rgba(224,82,82,.3);  background:rgba(224,82,82,.06);}

#status{text-align:center;font-size:12px;color:var(--dim);letter-spacing:1px;
  min-height:20px;margin-bottom:20px;transition:color .3s;}
#status.ok{color:var(--verde);}
#status.erro{color:var(--verm);}
#status.enviando{color:var(--amarel);}

/* Preview da câmera */
#preview-wrap{position:relative;margin-bottom:20px;border-radius:10px;overflow:hidden;
  border:1px solid var(--borda);background:#000;aspect-ratio:9/16;max-height:400px;}
#preview{width:100%;height:100%;object-fit:cover;display:block;}
.preview-overlay{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:12px;background:rgba(0,0,0,.5);}
.preview-overlay.oculto{display:none;}

/* Indicador AO VIVO */
#live-badge{position:absolute;top:12px;left:12px;display:none;
  align-items:center;gap:6px;background:rgba(0,0,0,.7);
  border:1px solid var(--verm);border-radius:20px;padding:5px 12px;
  font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--verm);}
#live-badge.visivel{display:flex;}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--verm);
  animation:pulsev 1s ease infinite;}
@keyframes pulsev{0%,100%{opacity:1;}50%{opacity:.3;}}

/* Contador de chunks */
#chunk-info{position:absolute;bottom:12px;left:12px;right:12px;
  display:none;justify-content:space-between;align-items:center;}
#chunk-info.visivel{display:flex;}
.chunk-num{font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.5);}
.chunk-prog{flex:1;height:2px;background:rgba(255,255,255,.15);margin:0 10px;border-radius:1px;overflow:hidden;}
.chunk-fill{height:100%;width:0%;background:var(--verde);transition:width .1s linear;}

/* Botão principal */
#btn-iniciar{width:100%;background:var(--fg);color:var(--bg);border:none;
  border-radius:5px;padding:16px;font-family:'Montserrat',sans-serif;font-size:11px;
  font-weight:700;letter-spacing:4px;text-transform:uppercase;cursor:pointer;
  transition:all .2s;margin-bottom:12px;}
#btn-iniciar:hover{background:#d8d8d8;}
#btn-iniciar.parar{background:var(--verm);color:#fff;}

#btn-parar{width:100%;background:none;border:1px solid var(--borda);
  border-radius:5px;padding:12px;font-family:'Montserrat',sans-serif;font-size:10px;
  font-weight:600;letter-spacing:3px;text-transform:uppercase;cursor:pointer;
  color:var(--dim);transition:all .2s;display:none;}
#btn-parar:hover{border-color:var(--verm);color:var(--verm);}

/* Stats */
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:16px;}
.stat{background:var(--card);border:1px solid var(--borda);border-radius:6px;
  padding:10px;text-align:center;}
.stat-val{font-size:18px;font-weight:700;letter-spacing:2px;}
.stat-lbl{font-size:7px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-top:3px;}

#tela-erro{display:none;text-align:center;padding:80px 24px;}
.err-icon{font-size:44px;margin-bottom:14px;}
.err-txt{font-size:13px;color:var(--dim);line-height:1.8;}
</style>
</head>
<body>

<div id="tela-erro">
  <div class="err-icon">⚠️</div>
  <div class="err-txt">Link inválido ou sessão expirada.<br>Escaneie o QR Code novamente.</div>
</div>

<div class="wrap" id="tela-ok">
  <div class="hdr">
    <div class="logo">Momento<span>∞</span></div>
    <div class="sub">Cinema ao vivo</div>
    <div class="badge-sessao">
      <div class="badge-label">Sessão</div>
      <div class="badge-val" id="sid-display">—</div>
    </div>
  </div>

  <div class="pill amarelo" id="pill">● Conectando...</div>
  <p id="status">Inicie para transmitir ao vivo</p>

  <div id="preview-wrap">
    <video id="preview" autoplay muted playsinline></video>
    <div id="live-badge"><div class="live-dot"></div>AO VIVO</div>
    <div id="chunk-info">
      <div class="chunk-num" id="chunk-num">chunk #0</div>
      <div class="chunk-prog"><div class="chunk-fill" id="chunk-fill"></div></div>
      <div class="chunk-num" id="chunk-enviados">0 enviados</div>
    </div>
    <div class="preview-overlay" id="overlay">
      <div style="font-size:48px;">📹</div>
      <div style="font-size:11px;letter-spacing:3px;color:rgba(255,255,255,.5);text-transform:uppercase;">Câmera pronta</div>
    </div>
  </div>

  <button id="btn-iniciar" onclick="iniciarTransmissao()">▶ Iniciar Transmissão</button>
  <button id="btn-parar"   onclick="pararTransmissao()">■ Parar</button>

  <div class="stats">
    <div class="stat"><div class="stat-val" id="st-chunks">0</div><div class="stat-lbl">Chunks</div></div>
    <div class="stat"><div class="stat-val" id="st-tempo">0s</div><div class="stat-lbl">Tempo</div></div>
    <div class="stat"><div class="stat-val" id="st-status">—</div><div class="stat-lbl">Estado</div></div>
  </div>
</div>

<script>
const CHUNK_S  = 10;       // duração de cada chunk em segundos
const params   = new URLSearchParams(location.search);
const SID      = (params.get('sessao')||'').toUpperCase();

let ws         = null;
let recon      = null;
let stream     = null;
let recorder   = null;
let transmitindo = false;
let chunkNum   = 0;
let enviados   = 0;
let tempoInicio= null;
let timerTempo = null;
let progTimer  = null;

window.addEventListener('DOMContentLoaded', async () => {
  if (!SID) { mostrarErro(); return; }
  try {
    const r = await fetch(`/api/sessao/${SID}`);
    const d = await r.json();
    if (!d.success) throw new Error();
  } catch { mostrarErro(); return; }

  document.getElementById('sid-display').textContent = SID;
  ligarWS();
  await iniciarCamera();
});

function mostrarErro(){
  document.getElementById('tela-ok').style.display='none';
  document.getElementById('tela-erro').style.display='block';
}

async function iniciarCamera(){
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width:{ideal:1280}, height:{ideal:720} },
      audio: true
    });
    document.getElementById('preview').srcObject = stream;
    document.getElementById('overlay').classList.add('oculto');
    setStatus('Câmera pronta — toque em iniciar','ok');
  } catch(e) {
    setStatus('Câmera não disponível: '+e.message,'erro');
  }
}

function ligarWS(){
  if(recon) clearTimeout(recon);
  if(ws)    ws.close();
  const url=(location.protocol==='https:'?'wss://':'ws://')+location.host;
  ws=new WebSocket(url);
  setPill('amarelo','● Conectando...');
  ws.onopen=()=>{
    ws.send(JSON.stringify({tipo:'celular_conectado', sessaoId:SID}));
    setPill('verde','● Conectado');
  };
  ws.onmessage=(e)=>{
    const m=JSON.parse(e.data);
    if(m.tipo==='sessao_encerrada'){ setPill('vermelho','● Encerrada'); pararTransmissao(); }
  };
  ws.onclose=()=>{ setPill('vermelho','● Reconectando...'); recon=setTimeout(ligarWS,3000); };
}

async function iniciarTransmissao(){
  if(!stream){ await iniciarCamera(); if(!stream) return; }
  transmitindo = true;
  chunkNum     = 0;
  enviados     = 0;
  tempoInicio  = Date.now();

  document.getElementById('btn-iniciar').style.display='none';
  document.getElementById('btn-parar').style.display='block';
  document.getElementById('live-badge').classList.add('visivel');
  document.getElementById('chunk-info').classList.add('visivel');

  setStatus('Transmitindo ao vivo...','enviando');
  document.getElementById('st-status').textContent = '🔴';

  timerTempo = setInterval(()=>{
    const s = Math.floor((Date.now()-tempoInicio)/1000);
    document.getElementById('st-tempo').textContent = s+'s';
  }, 1000);

  gravarChunk();
}

function pararTransmissao(){
  transmitindo = false;
  if(recorder && recorder.state !== 'inactive') recorder.stop();
  clearInterval(timerTempo);
  clearInterval(progTimer);

  document.getElementById('btn-iniciar').style.display='block';
  document.getElementById('btn-parar').style.display='none';
  document.getElementById('live-badge').classList.remove('visivel');
  document.getElementById('chunk-info').classList.remove('visivel');
  document.getElementById('chunk-fill').style.width = '0%';
  document.getElementById('st-status').textContent = '■';

  setStatus('Transmissão encerrada','');
}

function gravarChunk(){
  if(!transmitindo) return;

  chunkNum++;
  document.getElementById('chunk-num').textContent = 'chunk #'+chunkNum;
  document.getElementById('st-chunks').textContent = chunkNum;

  // barra de progresso do chunk
  let progPct = 0;
  const fill  = document.getElementById('chunk-fill');
  fill.style.width = '0%';
  if(progTimer) clearInterval(progTimer);
  progTimer = setInterval(()=>{
    progPct += (100 / (CHUNK_S * 10));
    if(progPct > 100) progPct = 100;
    fill.style.width = progPct+'%';
  }, 100);

  const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9')
    ? 'video/webm;codecs=vp9'
    : MediaRecorder.isTypeSupported('video/webm')
    ? 'video/webm'
    : 'video/mp4';

  const chunks = [];
  try {
    recorder = new MediaRecorder(stream, {
      mimeType,
      videoBitsPerSecond: 4000000  // 1.5 Mbps — equilibrio qualidade/velocidade
    });
  } catch(e) {
    recorder = new MediaRecorder(stream);
  }

  recorder.ondataavailable = e => { if(e.data.size > 0) chunks.push(e.data); };

  recorder.onstop = async () => {
    clearInterval(progTimer);
    document.getElementById('chunk-fill').style.width = '100%';

    if(!transmitindo && chunks.length === 0) return;

    const blob = new Blob(chunks, {type: recorder.mimeType});
    enviarChunk(blob, chunkNum);

    // já começa o próximo sem esperar o upload
    if(transmitindo) gravarChunk();
  };

  recorder.start();
  setTimeout(()=>{
    if(recorder && recorder.state === 'recording') recorder.stop();
  }, CHUNK_S * 1000);
}

async function enviarChunk(blob, num){
  try {
    console.log(`[chunk ${num}] tamanho: ${(blob.size/1024).toFixed(1)}KB tipo: ${blob.type}`);

    const ext  = blob.type.includes('webm') ? 'webm' : 'mp4';
    const form = new FormData();
    form.append('video',    blob, `chunk_${num}.${ext}`);
    form.append('sessaoId', SID);
    form.append('videoId',  'chunk_'+Date.now()+'_'+num);
    form.append('isChunk',  'true');

    const r = await fetch('/api/video/upload', { method:'POST', body:form });

    console.log(`[chunk ${num}] HTTP status: ${r.status}`);

    const texto = await r.text();
    console.log(`[chunk ${num}] resposta raw: ${texto}`);

    let d;
    try { d = JSON.parse(texto); } catch(e) {
      setStatus('Erro parse JSON: '+texto.slice(0,80),'erro');
      return;
    }

    if(d.success){
      enviados++;
      document.getElementById('chunk-enviados').textContent = enviados+' enviados';
      document.getElementById('st-chunks').textContent = enviados;
      setStatus(`Chunk ${num} enviado ✓`,'ok');
    } else {
      setStatus(`Erro chunk ${num}: ${d.error}`,'erro');
      console.error(`[chunk ${num}] falhou:`, d);
    }
  } catch(e) {
    console.error(`[chunk ${num}] exceção:`, e);
    setStatus('Exceção: '+e.message,'erro');
  }
}

function setPill(cor,txt){ const p=document.getElementById('pill'); p.className=`pill ${cor}`; p.textContent=txt; }
function setStatus(m,t){ const s=document.getElementById('status'); s.textContent=m; s.className=t||''; }
</script>
</body>
</html>
